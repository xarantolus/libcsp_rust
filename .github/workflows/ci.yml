name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  # All features except ropi-rwpi (requires ARM asm trampolines) and
  # usart-windows (wrong platform).
  CI_FEATURES: "std,rdp,rdp-fast-close,crc32,hmac,xtea,qos,promisc,dedup,cidr-rtable,socketcan,zmq,usart-linux,debug,debug-timestamp,external-arch"

jobs:
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsocketcan-dev libzmq3-dev

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: Build
        run: cargo build --all-targets --features "$CI_FEATURES"

      - name: Test
        run: cargo test --features "$CI_FEATURES"

      - name: Clippy
        run: cargo clippy --all-targets --features "$CI_FEATURES" -- -D warnings

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Build custom_arch external example
        # Standalone crate that disables `host-default-arch` so it can supply
        # its own `csp_*` symbols via `export_arch!`. Built separately so the
        # parent crate's full feature build (which includes `host-default-arch`)
        # doesn't try to link both copies.
        run: cargo build --manifest-path examples/custom_arch_external/Cargo.toml

  build-embedded:
    name: Build (Embassy Example)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: thumbv7em-none-eabihf

      - name: Build Embassy Example
        run: |
          cd embassy-example
          cargo build --release

  release:
    name: Release
    needs: [test-linux, build-embedded]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Package Crate
        run: cargo package

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: libcsp-crate
          path: target/package/*.crate
