name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  # Features used to actually run the test suite on hosted Linux. Excluded:
  #   - ropi-rwpi: requires ARM asm trampolines, only meaningful on cortex-m.
  #   - external-arch: forces CSP_ENABLE_CSP_PRINT=0 / CSP_HAVE_STDIO=0, so
  #     stdio-dependent helpers like `csp_rtable_load`/`save`/`check` and
  #     `csp_rtable_print` are *not* compiled into libcsp. Several integration
  #     tests rely on `route::load(...)`, so we run the test suite without
  #     external-arch and then build (only build, not test) with it enabled
  #     in a separate step.
  CI_FEATURES: "std,rdp,rdp-fast-close,hmac,promisc,dedup,socketcan,zmq,usart-linux,debug,zmq-v1-fixup,buffer-zero-clear"
  # Same as CI_FEATURES but with external-arch added — used only for build
  # checks (not `cargo test`) on hosted Linux.
  CI_FEATURES_EXTERNAL_ARCH: "std,rdp,rdp-fast-close,hmac,promisc,dedup,socketcan,zmq,usart-linux,debug,zmq-v1-fixup,buffer-zero-clear,external-arch"

jobs:
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsocketcan-dev libzmq3-dev

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: Build
        run: cargo build --all-targets --features "$CI_FEATURES"

      - name: Test
        run: cargo test --features "$CI_FEATURES"

      - name: Clippy
        run: cargo clippy --all-targets --features "$CI_FEATURES" -- -D warnings

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Build with external-arch
        # external-arch swaps the OS shim implementation; combined with the
        # default `host-default-arch` it auto-exports the POSIX TestArch so
        # the static lib still links. We can build but not run the full test
        # suite (see CI_FEATURES_EXTERNAL_ARCH note above).
        run: cargo build --all-targets --features "$CI_FEATURES_EXTERNAL_ARCH"

      - name: Clippy with external-arch
        run: cargo clippy --all-targets --features "$CI_FEATURES_EXTERNAL_ARCH" -- -D warnings

      - name: Build custom_arch external example
        # Standalone crate that disables `host-default-arch` so it can supply
        # its own `csp_*` symbols via `export_arch!`. Built separately so the
        # parent crate's full feature build (which includes `host-default-arch`)
        # doesn't try to link both copies.
        run: cargo build --manifest-path examples/custom_arch_external/Cargo.toml

  build-embedded:
    name: Build (Embassy Example)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: thumbv7em-none-eabihf

      - name: Build Embassy Example
        run: |
          cd embassy-example
          cargo build --release

  release:
    name: Release
    needs: [test-linux, build-embedded]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Package Crate
        run: cargo package

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: libcsp-crate
          path: target/package/*.crate
